<!-- resources/ui/components/dashboard.html - example -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/public/css/ui-theme.css" />
    <title>Dashboard Example</title>
  </head>
  <body>
    <div class="container">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
        "
      >
        <h1 class="h1">Dashboard</h1>
        <div>
          <button class="btn" id="themeToggle">Toggle Theme</button>
        </div>
      </div>

      <div class="row">
        <div class="col card">
          <div class="h1">KPI Waterfall</div>
          <div class="kpi">
            <div class="value">Rp 1,250,000</div>
            <div class="muted">(today)</div>
          </div>
          <div
            style="
              height: 140px;
              background: linear-gradient(
                90deg,
                rgba(14, 165, 164, 0.15),
                transparent
              );
            "
          ></div>
        </div>

        <div class="card" style="width: 200px">
          <div class="h1">Cold Storage</div>
          <div class="gauge">12°C</div>
          <div style="margin-top: 8px" class="muted">Nominal</div>
        </div>
      </div>

      <div class="card alert" style="margin-top: 12px">
        Warning: stock for Produk A below safety threshold
      </div>
    </div>

    <script src="/public/js/ui-theme.js"></script>
    <script>
      document.getElementById("themeToggle").addEventListener("click", () => {
        window.PSTheme.toggle();
      });
    </script>
  </body>
</html>
