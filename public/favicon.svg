<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fishGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="white" rx="20"/>
  
  <!-- Fish body -->
  <ellipse cx="50" cy="50" rx="28" ry="20" fill="url(#fishGradient)"/>
  
  <!-- Fish head (circle overlay) -->
  <circle cx="65" cy="50" r="15" fill="url(#fishGradient)"/>
  
  <!-- Fish tail -->
  <path d="M 22 50 Q 15 40 8 35 Q 10 50 8 65 Q 15 60 22 50 Z" fill="url(#fishGradient)" opacity="0.9"/>
  
  <!-- Fish eye -->
  <circle cx="70" cy="48" r="3" fill="white"/>
  
  <!-- Fish fin -->
  <path d="M 45 28 Q 48 18 50 12 Q 52 18 55 28 Z" fill="url(#fishGradient)" opacity="0.8"/>
</svg>