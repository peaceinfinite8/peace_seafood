<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradien untuk Lapisan Sayap Belakang (Downstroke) -->
    <radialGradient id="backGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#1A252F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F171E" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Gradien untuk Tubuh Utama (Mid-stroke) -->
    <radialGradient id="midGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="60%" stop-color="#1A252F"/>
      <stop offset="100%" stop-color="#0F171E"/>
    </radialGradient>

    <!-- Gradien untuk Lapisan Sayap Depan (Upstroke) -->
    <radialGradient id="frontGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#34495E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A252F" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Gradien untuk Ekor (Sangat Tirus) -->
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A252F"/>
      <stop offset="100%" stop-color="#0F171E"/>
    </linearGradient>

    <!-- Filter Efek Glow untuk Elemen Gerak -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow-sharp">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ================= LAPISAN 1: SAYAP BELAKANG (DOWNSTROKE) ================= -->
  <g id="back-wings">
    <!-- Sayap Kiri Belakang -->
    <path d="M 500,100 C 380,100 200,250 70,400 Q 160,480 300,500 Q 400,550 460,580" 
          fill="url(#backGrad)" stroke="#4A5568" stroke-width="2"/>
    <!-- Sayap Kanan Belakang -->
    <path d="M 500,100 C 620,100 800,250 930,400 Q 840,480 700,500 Q 600,550 540,580" 
          fill="url(#backGrad)" stroke="#4A5568" stroke-width="2"/>
  </g>

  <!-- ================= LAPISAN 2: EKOR & SIRIP BAWAH (DIPERKECIL & DITIPISKAN) ================= -->
  <g id="tail-pelvic">
    <!-- Sirip Bawah Kiri (Diperpendek) -->
    <path d="M 460,580 C 380,590 310,600 310,630 C 360,640 420,610 470,595 Z" 
          fill="#0F171E" stroke="#4A5568" stroke-width="2"/>
    <!-- Sirip Bawah Kanan (Diperpendek) -->
    <path d="M 540,580 C 620,590 690,600 690,630 C 640,640 580,610 530,595 Z" 
          fill="#0F171E" stroke="#4A5568" stroke-width="2"/>

    <!-- Ekor Utama (Sangat Tirus) -->
    <path d="M 492,650 C 492,750 496,850 500,920 C 504,850 508,750 508,650 Z" 
          fill="url(#tailGrad)" stroke="#4A5568" stroke-width="1.5"/>
    
    <!-- Sengat/Barb di Ekor -->
    <path d="M 495,700 L 485,715 L 495,725 L 483,740 L 500,760 L 517,740 L 505,725 L 515,715 Z" 
          fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
    <path d="M 500,760 L 496,740 L 485,750 Z" fill="#F1948A"/>
  </g>

  <!-- ================= LAPISAN 3: TUBUH UTAMA (MID-STROKE) ================= -->
  <g id="mid-body">
    <!-- Badan Utama (Terhubung mulus ke ekor tipis) -->
    <path d="M 500,100 
             C 420,100 250,200 100,400 
             Q 200,480 350,520 
             Q 420,560 460,600 
             C 470,620 485,640 492,650 
             C 508,650 530,640 540,600 
             Q 580,560 650,520 
             Q 800,480 900,400 
             C 750,200 580,100 500,100 Z" 
          fill="url(#midGrad)" stroke="#4A5568" stroke-width="3"/>

    <!-- Corak Geometris Tubuh (Dorsal Spots) -->
    <g fill="#5DADE2" opacity="0.6">
      <!-- Bintik Utama -->
      <circle cx="450" cy="160" r="8"/>
      <circle cx="550" cy="160" r="8"/>
      <circle cx="480" cy="130" r="5"/>
      <circle cx="520" cy="130" r="5"/>
      <circle cx="350" cy="280" r="10"/>
      <circle cx="650" cy="280" r="10"/>
      <circle cx="380" cy="320" r="6"/>
      <circle cx="620" cy="320" r="6"/>
      <circle cx="250" cy="400" r="12"/>
      <circle cx="750" cy="400" r="12"/>
      <circle cx="300" cy="450" r="7"/>
      <circle cx="700" cy="450" r="7"/>
      <!-- Bintik Ekor -->
      <circle cx="495" cy="680" r="3"/>
      <circle cx="505" cy="680" r="3"/>
      <circle cx="498" cy="710" r="2.5"/>
      <circle cx="502" cy="710" r="2.5"/>
      <circle cx="500" cy="740" r="2"/>
      <circle cx="500" cy="770" r="1.5"/>
    </g>

    <!-- Tulang Rawan Sayap (Striations) -->
    <g fill="none" stroke="#4A5568" stroke-width="2" opacity="0.5">
      <!-- Kiri -->
      <path d="M 250,250 Q 180,300 100,400"/>
      <path d="M 280,280 Q 210,330 120,410"/>
      <path d="M 310,310 Q 240,360 140,420"/>
      <path d="M 340,340 Q 270,390 160,430"/>
      <path d="M 370,370 Q 300,420 180,440"/>
      <path d="M 400,400 Q 330,450 220,450"/>
      <path d="M 430,430 Q 360,480 260,460"/>
      <path d="M 460,460 Q 390,510 300,480"/>
      <!-- Kanan -->
      <path d="M 750,250 Q 820,300 900,400"/>
      <path d="M 720,280 Q 790,330 880,410"/>
      <path d="M 690,310 Q 760,360 860,420"/>
      <path d="M 660,340 Q 730,390 840,430"/>
      <path d="M 630,370 Q 700,420 820,440"/>
      <path d="M 600,400 Q 670,450 780,450"/>
      <path d="M 570,430 Q 640,480 740,460"/>
      <path d="M 540,460 Q 610,510 700,480"/>
    </g>

    <!-- Tulang Belakang Tengah (Notochord) -->
    <path d="M 500,100 Q 500,300 500,920" fill="none" stroke="#1A252F" stroke-width="6"/>
    <path d="M 500,100 Q 500,300 500,920" fill="none" stroke="#5DADE2" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- ================= LAPISAN 4: SAYAP DEPAN (UPSTROKE) ================= -->
  <g id="front-wings">
    <!-- Sayap Kiri Depan -->
    <path d="M 500,100 C 450,100 280,200 120,400 Q 220,460 370,500 Q 420,540 470,560" 
          fill="url(#frontGrad)" stroke="#7FB3D8" stroke-width="2"/>
    <!-- Sayap Kanan Depan -->
    <path d="M 500,100 C 550,100 720,200 880,400 Q 780,460 630,500 Q 580,540 530,560" 
          fill="url(#frontGrad)" stroke="#7FB3D8" stroke-width="2"/>

    <!-- Tulang Rawan Sayap Depan (Striations) -->
    <g fill="none" stroke="#7FB3D8" stroke-width="2" opacity="0.7">
      <!-- Kiri -->
      <path d="M 220,280 Q 160,340 120,400"/>
      <path d="M 250,310 Q 190,360 140,410"/>
      <path d="M 280,340 Q 220,390 160,430"/>
      <path d="M 310,370 Q 250,420 180,450"/>
      <path d="M 340,400 Q 280,450 220,460"/>
      <path d="M 370,430 Q 310,480 260,470"/>
      <!-- Kanan -->
      <path d="M 780,280 Q 840,340 880,400"/>
      <path d="M 750,310 Q 810,360 860,410"/>
      <path d="M 720,340 Q 780,390 840,430"/>
      <path d="M 690,370 Q 750,420 820,450"/>
      <path d="M 660,400 Q 720,450 780,460"/>
      <path d="M 630,430 Q 690,480 740,470"/>
    </g>
  </g>

  <!-- ================= DETAIL LOGO & EFEK GERAKAN ================= -->
  <g id="logo-details">
    <!-- Moncong Runcing (Snout) -->
    <polygon points="500,75 525,100 500,125 475,100" fill="#5DADE2" filter="url(#glow-sharp)"/>
    <polygon points="500,85 515,100 500,115 485,100" fill="#AED6F1"/>

    <!-- Garis Gerakan Dinamis di Ujung Sayap (Wingtip Motion) -->
    <g fill="none" stroke="#7FB3D8" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8">
      <!-- Kepakan Kiri -->
      <path d="M 70,390 Q 110,370 140,340" />
      <path d="M 80,410 Q 120,430 150,460" stroke-width="2"/>
      <!-- Kepakan Kanan -->
      <path d="M 930,390 Q 890,370 860,340" />
      <path d="M 920,410 Q 880,430 850,460" stroke-width="2"/>
    </g>

    <!-- Garis Dorongan Ekor (Tail Propulsion) -->
    <g fill="none" stroke="#7FB3D8" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8">
      <path d="M 500,920 Q 480,940 470,970" />
      <path d="M 500,920 Q 520,940 530,970" />
      <path d="M 500,920 Q 500,950 500,990" stroke-width="2"/>
    </g>

    <!-- Garis Luncuran Kepala (Head Glide) -->
    <g fill="none" stroke="#7FB3D8" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.6">
      <path d="M 450,100 Q 430,80 400,70" />
      <path d="M 550,100 Q 570,80 600,70" />
    </g>

    <!-- Partikel Air / Gelembung Energi -->
    <g fill="#AED6F1" filter="url(#glow)" opacity="0.8">
      <circle cx="180" cy="300" r="4"/>
      <circle cx="150" cy="350" r="3"/>
      <circle cx="820" cy="300" r="4"/>
      <circle cx="850" cy="350" r="3"/>
      <circle cx="500" cy="980" r="5"/>
      <circle cx="480" cy="950" r="3"/>
      <circle cx="520" cy="950" r="3"/>
    </g>
  </g>
</svg>